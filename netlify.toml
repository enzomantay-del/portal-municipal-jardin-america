[build]
  publish = "."
  # Si actualizás el repo hermano jardin-america-turismo, corré:
  #   python scripts/sync-turismo.py
  # antes de publicar, para refrescar /turismo/

[functions]
  directory = "netlify/functions"

# Turismo vive en el mismo dominio: jardinamerica.gob.ar/turismo/
[[redirects]]
  from = "/turismo"
  to = "/turismo/"
  status = 301

[build.environment]
  # La API key de Firebase Web es pública (se restringe en Firebase Console, no es un secreto de servidor).
  # Debe existir en js/firebase-config.js y también como FIREBASE_API_KEY para la edge function OG.
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"
  SECRETS_SCAN_OMIT_KEYS = "FIREBASE_API_KEY"

[[edge_functions]]
  path = "/noticia.html"
  function = "inject-noticia-og"

[[edge_functions]]
  path = "/og-image"
  function = "og-image"

[[headers]]
  for = "/og-image"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Access-Control-Allow-Origin = "*"

# HTML y scripts: sin caché larga (así el celular ve los mismos cambios que la PC).
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
cache\""

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
cache\""

[[headers]]
  for = "/turismo/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
cache\""

[[headers]]
  for = "/turismo/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    CDN-Cache-Control = "no-cache, no-store, must-revalidate"
    Netlify-CDN-Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    CDN-Cache-Control = "no-cache, no-store, must-revalidate"
    Netlify-CDN-Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/turismo/js/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    CDN-Cache-Control = "no-cache, no-store, must-revalidate"
    Netlify-CDN-Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/turismo/css/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    CDN-Cache-Control = "no-cache, no-store, must-revalidate"
    Netlify-CDN-Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
